<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Drawing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Distance-drawing rules from the newer shared stylesheet, inlined
           here so this page doesn't require changes to styles.css. */
        .distance-drawing-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .distance-drawing-controls .secondary-btn.is-active {
            background: var(--fg);
            color: var(--bg);
        }

        .distance-brush-control {
            border: 1px solid var(--border);
            padding: 7px 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .distance-brush-control input {
            width: 96px;
        }

        .distance-preview-surface {
            position: relative;
            width: 100%;
            max-height: 460px;
            aspect-ratio: 1 / 1;
        }

        .distance-preview-surface canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            max-height: none;
            display: block;
            image-rendering: pixelated;
        }

        #distance-line-canvas {
            cursor: crosshair;
            touch-action: none;
            mix-blend-mode: difference;
        }

        .distance-loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(10, 10, 14, 0.55);
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            z-index: 2;
        }

        .distance-loading-overlay[hidden] {
            display: none;
        }

        .distance-loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: distance-loading-spin 0.8s linear infinite;
        }

        @keyframes distance-loading-spin {
            to { transform: rotate(360deg); }
        }

        body.drawing-page {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .drawing-page .site-nav {
            flex: none;
        }

        .drawing-page .container {
            flex: 1;
            min-height: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px 20px;
        }

        .drawing-page .lab-header {
            flex: none;
            margin-bottom: 12px;
        }

        .drawing-main {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 16px;
        }

        .drawing-main > .network-panel {
            height: auto;
            min-height: 0;
            overflow: hidden;
        }

        .drawing-panel .controls {
            margin-bottom: 12px;
            flex-wrap: nowrap;
        }

        .drawing-panel .lab-preview-stage {
            flex: 1;
            min-height: 0;
        }

        .drawing-panel .distance-preview-surface {
            max-height: none;
            width: 256px;
            height: 256px;
        }

        .drawing-panel .panel-footer-actions {
            margin-top: 12px;
        }

        .gallery-panel {
            display: flex;
            flex-direction: column;
        }

        .gallery-grid {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            align-content: start;
            padding-right: 4px;
        }

        .gallery-tile {
            border: 1px solid var(--border);
            background: none;
            padding: 0;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            display: block;
        }

        .gallery-tile canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        .gallery-tile.is-active {
            outline: 2px solid var(--fg);
            outline-offset: -1px;
        }
    </style>
</head>
<body class="activation-lab-page drawing-page">
    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="../../index.html" class="site-brand">AA</a>
            <div class="site-nav-actions">
                <a href="../../index.html" class="nav-link font-mono-tech">Home</a>
                <button id="theme-toggle" class="theme-btn font-mono-tech">Invert</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="lab-header">
            <nav class="page-tabs" aria-label="Gifbreeder pages">
                <a href="index.html" class="page-tab">GIFBreeder</a>
                <a href="activation-lab.html" class="page-tab">Activation Lab</a>
                <a href="drawing.html" class="page-tab is-active">Drawing</a>
            </nav>
        </div>

        <div class="drawing-main">
            <section class="network-panel lab-preview-panel drawing-panel">
                <div class="controls lab-controls distance-drawing-controls" aria-label="Drawing controls">
                    <button id="distance-draw-toggle-btn" class="secondary-btn is-active" type="button">Draw Lines</button>
                    <button id="distance-clear-btn" class="secondary-btn" type="button">Clear Lines</button>
                    <label class="distance-brush-control">
                        <span>Line</span>
                        <input id="distance-brush-slider" type="range" min="2" max="36" step="1" value="8">
                    </label>
                    <label class="secondary-btn file-upload-btn">
                        Upload Genome JSON
                        <input id="genome-upload-input" type="file" accept=".json,application/json">
                    </label>
                </div>

                <div class="network-info" id="preview-status">
                    <p class="placeholder">Loading first gallery genome&hellip;</p>
                </div>

                <div class="lab-preview-stage">
                    <div class="distance-preview-surface">
                        <canvas id="preview-canvas"></canvas>
                        <canvas id="distance-line-canvas" aria-label="Draw distance divider lines"></canvas>
                        <div id="distance-loading-overlay" class="distance-loading-overlay" hidden>
                            <div class="distance-loading-spinner" aria-hidden="true"></div>
                            <span>Recomputing centers&hellip;</span>
                        </div>
                    </div>
                </div>

                <div class="panel-footer-actions">
                    <button id="save-genome-btn" class="secondary-btn" disabled>Save Genome</button>
                    <div class="download-menu">
                        <button id="download-preview-btn" class="secondary-btn" type="button" aria-haspopup="menu" aria-expanded="false" disabled>Download GIF</button>
                        <div id="download-resolution-menu" class="download-resolution-menu hidden" role="menu" aria-label="Download GIF resolution">
                            <button class="secondary-btn resolution-option-btn" type="button" data-download-resolution="64">64 x 64</button>
                            <button class="secondary-btn resolution-option-btn" type="button" data-download-resolution="128">128 x 128</button>
                            <button class="secondary-btn resolution-option-btn" type="button" data-download-resolution="512">512 x 512</button>
                            <button class="secondary-btn resolution-option-btn" type="button" data-download-resolution="1024">1024 x 1024</button>
                        </div>
                    </div>
                </div>
            </section>

            <aside class="network-panel gallery-panel">
                <h2>Limbomorphs</h2>
                <div class="network-info" id="gallery-status">
                    <p class="placeholder">Loading gallery&hellip;</p>
                </div>
                <div id="gallery-grid" class="gallery-grid"></div>
            </aside>
        </div>
    </div>

    <script src="neat.js"></script>
    <!-- Standalone copy of the newer cppn.js (adds distance-field support);
         the shared cppn.js used by index/activation-lab is untouched. -->
    <script src="drawing-cppn.js"></script>
    <script src="drawing.js"></script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') body.classList.add('dark');

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
